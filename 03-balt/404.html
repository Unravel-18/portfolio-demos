<script>
addEventListener("mousemove", function (e) {
  document.documentElement.style.setProperty("--mx", e.clientX + "px");
  document.documentElement.style.setProperty("--my", e.clientY + "px");
});
(function () {
  function placeBeam() {
    var wrap = document.getElementById("beamWrap");
    var hsvg = document.querySelector(".harbor svg");
    var hero = document.querySelector(".hero");
    if (!wrap || !hsvg || !hero) return;
    var r = hsvg.getBoundingClientRect();
    var hr = hero.getBoundingClientRect();
    var u = r.height / 420;
    wrap.style.left = (r.right - (1440 - 1250) * u - hr.left) + "px";
    wrap.style.top = (r.top + 92 * u - hr.top) + "px";
  }
  addEventListener("resize", placeBeam);
  placeBeam();
  setTimeout(placeBeam, 300);
  var l = localStorage.getItem("balt_lang") || "pl";
  if (l === "en") document.querySelectorAll("[data-en]").forEach(function (e) {
    var v = e.getAttribute("data-en");
    if (v.indexOf("<") >= 0) e.innerHTML = v; else e.textContent = v;
  });
})();
</script>
